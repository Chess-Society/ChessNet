[build]
  command = "pnpm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"
  NODE_OPTIONS = "--max-old-space-size=6144"

[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "unsafe-none"
    Cross-Origin-Embedder-Policy = "credentialless"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # LOW-01: CSP — protección contra XSS e inyección de recursos
    # 'unsafe-inline' requerido para Svelte SSR (estilos inline) y Firebase SDK
    # connect-src incluye Firebase, Stripe y Lichess API
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://apis.google.com https://www.gstatic.com https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://api.stripe.com https://lichess.org https://www.chess.com; frame-src https://js.stripe.com https://hooks.stripe.com; object-src 'none'; base-uri 'self';"

[[headers]]
  for = "/_app/immutable/*"
  [headers.values]
    cache-control = "public, immutable, max-age=31536000"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"