<!doctype html>
<html lang="es" class="h-full">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#10b981" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChessNet - Plataforma Educativa de Ajedrez</title>
    <meta
      name="description"
      content="Plataforma educativa de ajedrez para colegios, clubes y academias"
    />
    %sveltekit.head%
  </head>
  <body
    data-sveltekit-preload-data="hover"
    class="h-full bg-slate-900 text-slate-100"
  >
    <div style="display: contents" class="h-full">%sveltekit.body%</div>
    
    <script>
      // Clean up any legacy Service Workers from previous versions (Svelte 4/gh-pages)
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            console.log('🧹 Removing legacy Service Worker:', registration.scope);
            registration.unregister();
          }
          if (registrations.length > 0) {
            console.log('🔄 Reloading to ensure clean state...');
            window.location.reload();
          }
        });
      }
    </script>
  </body>
</html>
